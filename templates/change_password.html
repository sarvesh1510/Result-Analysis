{% extends "base.html" %}

{% block content %}

<div class="password-container">

    <div class="password-card">

        <h2>Change Password</h2>
        <p class="subtitle">Update your account password securely</p>

        {% if error %}
        <div class="alert error">{{ error }}</div>
        {% endif %}

        {% if message %}
        <div class="alert success">{{ message }}</div>
        {% endif %}

        <form method="POST" id="passwordForm">

            <label>Current Password</label>
            <div class="input-group">
                <input type="password" name="current_password" id="currentPassword" required>
            </div>

            <label>New Password</label>
            <div class="input-group">
                <input type="password" name="new_password" id="newPassword" required onkeyup="checkStrength()">
            </div>

            <!-- Strength Bar -->
            <div class="strength-container">
                <div id="strengthBar"></div>
            </div>
            <small id="strengthText"></small>

            <label>Confirm Password</label>
            <div class="input-group">
                <input type="password" id="confirmPassword" required onkeyup="checkMatch()">
            </div>

            <small id="matchText"></small>

            <button type="submit" class="update-btn">Update Password</button>

        </form>

    </div>

</div>

<!-- PASSWORD SCRIPT -->

<script>

function togglePassword(id){
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

function checkStrength(){

    const password = document.getElementById("newPassword").value;
    const bar = document.getElementById("strengthBar");
    const text = document.getElementById("strengthText");

    let strength = 0;

    if(password.length >= 6) strength++;
    if(/[A-Z]/.test(password)) strength++;
    if(/[0-9]/.test(password)) strength++;
    if(/[@$!%*?&]/.test(password)) strength++;

    if(strength === 1){
        bar.style.width = "25%";
        bar.style.background = "#ef4444";
        text.innerText = "Weak password";
    }
    else if(strength === 2){
        bar.style.width = "50%";
        bar.style.background = "#f59e0b";
        text.innerText = "Medium password";
    }
    else if(strength >= 3){
        bar.style.width = "100%";
        bar.style.background = "#10b981";
        text.innerText = "Strong password";
    }
}

function checkMatch(){

    const pass = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const text = document.getElementById("matchText");

    if(confirm.length === 0){
        text.innerText = "";
        return;
    }

    if(pass === confirm){
        text.style.color = "green";
        text.innerText = "Passwords match";
    } else {
        text.style.color = "red";
        text.innerText = "Passwords do not match";
    }

}

</script>

{% endblock %}
