{% extends "base.html" %}

{% block content %}

<style>

.page-container{
max-width:900px;
margin:auto;
padding:20px;
}

.settings-card{
background:#ffffff;
padding:35px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.settings-header h2{
margin-bottom:5px;
}

.settings-header p{
color:#666;
margin-bottom:25px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
font-weight:600;
margin-bottom:6px;
font-size:14px;
}

.form-group input{
padding:11px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
transition:0.2s;
}

.form-group input:focus{
outline:none;
border-color:#4f46e5;
box-shadow:0 0 0 3px rgba(79,70,229,0.15);
}

.form-group input:disabled{
background:#f5f5f5;
color:#777;
}

.btn-primary{
margin-top:25px;
padding:12px 20px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.btn-primary:hover{
background:#4338ca;
}

.btn-secondary{
margin-top:15px;
padding:10px 18px;
background:#111827;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.success-msg{
color:#16a34a;
background:#ecfdf5;
padding:10px;
border-radius:6px;
margin-bottom:15px;
}

.section-divider{
margin:35px 0 20px 0;
border-top:1px solid #eee;
}

.security-box p{
color:#666;
margin-bottom:10px;
}

@media(max-width:700px){
.form-grid{
grid-template-columns:1fr;
}
}

</style>

<div class="page-container">

<div class="settings-card">

<div class="settings-header">
<h2>Account Settings</h2>
<p>Manage your profile information</p>
</div>

{% if message %}
<div class="success-msg">{{ message }}</div>
{% endif %}

<form method="POST">

<div class="form-grid">

<div class="form-group">
<label>Full Name</label>
<input type="text" name="name" value="{{ user[0] }}" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" value="{{ user[1] if user|length > 1 else '' }}">
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" name="phone" value="{{ user[2] if user|length > 2 else '' }}">
</div>

<div class="form-group">
<label>Username</label>
<input type="text" value="{{ session.get('user') }}" disabled>
</div>

<div class="form-group">
<label>Program</label>
<input type="text" value="{{ user[3] if user|length > 3 else '' }}" disabled>
</div>

<div class="form-group">
<label>Batch</label>
<input type="text" value="{{ user[4] if user|length > 4 else '' }}" disabled>
</div>

</div>

<button class="btn-primary" type="submit">Update Profile</button>

</form>

<div class="section-divider"></div>

<div class="security-box">

<h3>Account Security</h3>
<p>You can update your password from the security section.</p>

<a href="{{ url_for('auth.change_password') }}">
<button class="btn-secondary" type="button">
Change Password
</button>
</a>

</div>

</div>

</div>

{% endblock %}
